<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepa Stop | Premium Edition</title>
    <style>
        /* Stark Premium Minimalist White & Black Vibe */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: -0.3px;
        }

        body {
            background: linear-gradient(135deg, #000000, #111111);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Premium White Frame Container */
        .phone-container {
            width: 100%;
            max-width: 390px;
            background: #ffffff;
            color: #000000;
            border-radius: 32px;
            padding: 30px 24px 40px 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
        }

        /* Luxury Sponsor Banner Component */
        .sponsor-banner {
            background: #000000;
            color: #ffffff;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: inline-block;
            width: 100%;
            animation: pulseGlow 2s infinite ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes pulseGlow {
            0% { opacity: 0.8; box-shadow: 0 0 0px rgba(0,0,0,0); }
            50% { opacity: 1; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); background: #111111; }
            100% { opacity: 0.8; box-shadow: 0 0 0px rgba(0,0,0,0); }
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: #000000;
        }

        header p {
            color: #777777;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
            margin-bottom: 35px;
        }

        /* Minimal Target Badge */
        .target-box {
            background: #f5f5f7;
            border: 1px solid #e5e5e7;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.9rem;
            color: #555555;
            font-weight: 500;
        }

        .target-box span {
            color: #000000;
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Bold Stark Timer Display */
        .timer-display {
            font-size: 3.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            margin: 45px 0;
            color: #000000;
            letter-spacing: -1.5px;
            transition: color 0.15s ease;
        }

        /* Controls Layout */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* Premium Stark Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        /* Pure Black Action Button */
        .action-btn {
            background: #000000;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .action-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Pure Dark Gray for Stop State */
        .action-btn.stop-mode {
            background: #222222;
        }

        /* Clean Bordered Reset Button */
        .reset-btn {
            background: transparent;
            color: #000000;
            border: 2px solid #000000;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: 14px;
        }

        .reset-btn:hover {
            background: #000000;
            color: #ffffff;
        }

        .reset-btn:active {
            transform: scale(0.98);
        }

        /* Feedback Status */
        .feedback {
            height: 28px;
            font-weight: 800;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }
        .perfect { color: #000000; text-decoration: underline; text-underline-offset: 4px; }
        .close { color: #333333; }
        .missed { color: #888888; font-weight: 500; }

        /* Performance Tracking Metric UI */
        .stats-container {
            margin-top: 25px;
            border-top: 1px solid #e5e5e7;
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
        }

        .stat-card {
            background: #f5f5f7;
            border: 1px solid #e5e5e7;
            padding: 12px 14px;
            border-radius: 14px;
            width: 48%;
            text-align: left;
        }

        .stat-card p {
            font-size: 0.65rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-card h3 {
            font-size: 1.1rem;
            color: #000000;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div class="sponsor-banner">
            ⚡ Still Waiting For Sponsor ⚡
        </div>

        <header>
            <h1>NEPA STOP</h1>
            <p>Ecosystem Network</p>
        </header>

        <div class="target-box">
            Target: Stop exactly on <span>00:05.000</span>
        </div>

        <div class="timer-display" id="display">00:00.000</div>

        <div class="control-group">
            <button class="btn action-btn" id="actionBtn">START</button>
            <button class="btn reset-btn" id="resetBtn">RESET SYSTEM</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="stats-container">
            <div class="stat-card">
                <p>Best Delta</p>
                <h3 id="bestDiff">--</h3>
            </div>
            <div class="stat-card">
                <p>Attempts</p>
                <h3 id="attempts">0</h3>
            </div>
        </div>
    </div>

    <script>
        let startTime;
        let elapsedRealtime = 0;
        let tInterval;
        let running = false;
        const targetSeconds = 5.000;

        const display = document.getElementById('display');
        const actionBtn = document.getElementById('actionBtn');
        const resetBtn = document.getElementById('resetBtn');
        const feedback = document.getElementById('feedback');
        const bestDiffDisplay = document.getElementById('bestDiff');
        const attemptsDisplay = document.getElementById('attempts');

        let totalAttempts = parseInt(localStorage.getItem('nepastop_attempts')) || 0;
        let bestDifference = localStorage.getItem('nepastop_best_diff') ? parseFloat(localStorage.getItem('nepastop_best_diff')) : null;

        attemptsDisplay.innerText = totalAttempts;
        if (bestDifference !== null) {
            bestDiffDisplay.innerText = `±${bestDifference.toFixed(3)}s`;
        }

        actionBtn.addEventListener('click', () => {
            if (!running) {
                running = true;
                feedback.innerText = "";
                actionBtn.innerText = "STOP";
                actionBtn.classList.add('stop-mode');
                startTime = new Date().getTime() - elapsedRealtime;
                tInterval = setInterval(renderLoop, 1);
            } else {
                running = false;
                clearInterval(tInterval);
                actionBtn.innerText = "START";
                actionBtn.classList.remove('stop-mode');
                processScore();
            }
        });

        resetBtn.addEventListener('click', () => {
            running = false;
            clearInterval(tInterval);
            elapsedRealtime = 0;
            display.innerText = "00:00.000";
            actionBtn.innerText = "START";
            actionBtn.classList.remove('stop-mode');
            feedback.innerText = "";
            localStorage.removeItem('nepastop_attempts');
            localStorage.removeItem('nepastop_best_diff');
            totalAttempts = 0;
            bestDifference = null;
            attemptsDisplay.innerText = "0";
            bestDiffDisplay.innerText = "--";
        });

        function renderLoop() {
            let currentTime = new Date().getTime();
            elapsedRealtime = currentTime - startTime;
            
            let totalSeconds = Math.floor(elapsedRealtime / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            let milliseconds = elapsedRealtime % 1000;
            
            let displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            let displaySeconds = seconds < 10 ? '0' + seconds : seconds;
            let displayMs = milliseconds < 10 ? '00' + milliseconds : milliseconds < 100 ? '0' + milliseconds : milliseconds;

            display.innerText = displayMinutes + ':' + displaySeconds + '.' + displayMs;
        }

        function processScore() {
            const finalTimeSeconds = elapsedRealtime / 1000;
            const absoluteDifference = Math.abs(finalTimeSeconds - targetSeconds);
            
            totalAttempts++;
            localStorage.setItem('nepastop_attempts', totalAttempts);
            attemptsDisplay.innerText = totalAttempts;

            if (bestDifference === null || absoluteDifference < bestDifference) {
                bestDifference = absoluteDifference;
                localStorage.setItem('nepastop_best_diff', bestDifference);
                bestDiffDisplay.innerText = `±${bestDifference.toFixed(3)}s`;
            }

            if (absoluteDifference === 0) {
                feedback.innerHTML = '<span class="perfect">ABSOLUTE PERFECT!</span>';
            } else if (absoluteDifference <= 0.05) {
                feedback.innerHTML = '<span class="perfect">NEAR PERFECT</span>';
            } else if (absoluteDifference <= 0.15) {
                feedback.innerHTML = '<span class="close">ELITE TIMING</span>';
            } else {
                feedback.innerHTML = '<span class="missed">OFF TARGET</span>';
            }
        }
    </script>
</body>
</html>
